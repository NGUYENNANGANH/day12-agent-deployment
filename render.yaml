services:
  # 1. Backend API
  - type: web
    name: eco-health-api
    runtime: docker
    dockerContext: my-production-agent/backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        fromService:
          name: eco-health-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false

  # 2. Frontend
  - type: web
    name: eco-health-web
    runtime: docker
    dockerContext: my-production-agent/frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: BACKEND_HOST
        value: eco-health-api

# 3. Managed Redis
redis:
  - name: eco-health-redis
    plan: free
    # Note: Keep it as 'free' for the lab.

