services:
  # 1. Backend API
  - type: web
    name: eco-health-api
    runtime: docker
    dockerContext: my-production-agent/backend
    dockerfilePath: my-production-agent/backend/Dockerfile
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        fromService:
          name: eco-health-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 8000

  # 2. Frontend
  - type: web
    name: eco-health-web
    runtime: docker
    dockerContext: my-production-agent/frontend
    dockerfilePath: my-production-agent/frontend/Dockerfile
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://eco-health-api.onrender.com

  # 3. Redis Service
  - type: redis
    name: eco-health-redis
    plan: free
    ipAllowList: [] # Allow all internal connections
