services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: REDIS_URL
        # Placeholder for external redis connection if setting up in Render
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
