<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Eco-Health AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #37352f;
            --text-muted: #73726c;
            --border: #e9e9e7;
            --primary: #2383e2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 40px; }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        p { color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.95rem; background: #f7f6f3; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); background: #fff; }
        button { width: 100%; padding: 12px; background: var(--text); color: #fff; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .footer { margin-top: 24px; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .error { color: #eb5757; font-size: 0.85rem; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Đăng ký</h1>
        <p>Tham gia cộng đồng Eco-Health ngay hôm nay.</p>
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="u" placeholder="Nhập username...">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="p" placeholder="••••••••">
        </div>
        <button id="btn">Đăng ký tài khoản</button>
        <div class="error" id="err"></div>
        <div class="footer">
            Đã có tài khoản? <a href="/login">Đăng nhập</a>
        </div>
    </div>
    <script>
        document.getElementById('btn').onclick = async () => {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            const err = document.getElementById('err');
            if(!u || !p) return;
            try {
                const r = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const d = await r.json();
                if(r.ok) window.location.href = '/login';
                else { err.innerText = d.detail; err.style.display = 'block'; }
            } catch(e) { err.innerText = "Lỗi kết nối server"; err.style.display = 'block'; }
        };
    </script>
</body>
</html>
