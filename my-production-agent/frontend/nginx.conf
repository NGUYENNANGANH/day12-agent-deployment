events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Try multiple common resolvers: Render internal, Docker default, and Google backup
        resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=30s;

        # Serve static files from root
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Proxy API requests using variable to bypass startup DNS check
        location /api {
            # We use the service name directly
            set $backend_url http://eco-health-api:8000;
            proxy_pass $backend_url;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check
        location /health {
            return 200 'OK';
        }
    }
}
